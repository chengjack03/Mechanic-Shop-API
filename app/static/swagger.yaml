swagger: '2.0'
info:
  title: "Mechanic Shop API"
  description: "A RESTful API for managing a mechanic shop — customers, mechanics, service tickets, and inventory."
  version: "1.0.0"
host: "127.0.0.1:5000"
schemes: [http]
consumes: [application/json]
produces: [application/json]

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

paths:
  /customers/:
    post:
      tags: [Customers]
      summary: "Create a new customer"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerPayload"
      responses:
        201:
          description: "Customer created"
    get:
      tags: [Customers]
      summary: "Get all customers"
      responses:
        200:
          description: "Success"

  /customers/{customer_id}:
    put:
      tags: [Customers]
      summary: "Update a customer"
      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
        - in: body
          name: body
          schema:
            $ref: "#/definitions/UpdateCustomerPayload"
      responses:
        200:
          description: "Updated"
    delete:
      tags: [Customers]
      summary: "Delete a customer"
      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
      responses:
        200:
          description: "Deleted"

  /customers/login:
    post:
      tags: [Customers]
      summary: "Customer login"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginPayload"
      responses:
        200:
          description: "Login successful"

  /mechanics/:
    post:
      tags: [Mechanics]
      summary: "Create a mechanic"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMechanicPayload"
      responses:
        201:
          description: "Mechanic created"
    get:
      tags: [Mechanics]
      summary: "Get all mechanics"
      responses:
        200:
          description: "Success"

  /mechanics/{mechanic_id}:
    put:
      tags: [Mechanics]
      summary: "Update a mechanic"
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: mechanic_id
          required: true
          type: integer
        - in: body
          name: body
          schema:
            $ref: "#/definitions/UpdateMechanicPayload"
      responses:
        200:
          description: "Updated"
    delete:
      tags: [Mechanics]
      summary: "Delete a mechanic"
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "Deleted"

  /mechanics/most-active:
    get:
      tags: [Mechanics]
      summary: "Get most active mechanics"
      description: "Returns mechanics sorted by the number of service tickets assigned."
      responses:
        200:
          description: "Success"
          schema:
            type: array
            items:
              $ref: "#/definitions/MechanicResponse"

  /service-tickets/:
    post:
      tags: [Service Tickets]
      summary: "Create a service ticket"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateTicketPayload"
      responses:
        201:
          description: "Ticket created"
    get:
      tags: [Service Tickets]
      summary: "Get all tickets"
      responses:
        200:
          description: "Success"

  /service-tickets/customer/{customer_id}:
    get:
      tags: [Service Tickets]
      summary: "Get tickets by customer"
      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
      responses:
        200:
          description: "Success"

  /inventory/:
    post:
      tags: [Inventory]
      summary: "Add inventory part"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreatePartPayload"
      responses:
        201:
          description: "Part created"
    get:
      tags: [Inventory]
      summary: "Get all inventory"
      responses:
        200:
          description: "Success"

  /inventory/{part_id}:
    put:
      tags: [Inventory]
      summary: "Update inventory part"
      parameters:
        - in: path
          name: part_id
          required: true
          type: integer
        - in: body
          name: body
          schema:
            $ref: "#/definitions/CreatePartPayload"
      responses:
        200:
          description: "Updated"
    delete:
      tags: [Inventory]
      summary: "Delete inventory part"
      parameters:
        - in: path
          name: part_id
          required: true
          type: integer
      responses:
        200:
          description: "Deleted"

definitions:
  CreateCustomerPayload:
    type: object
    required: [name, email, password, phone, address]
    properties:
      name: {type: string, example: "Jane Doe"}
      email: {type: string, example: "jane@email.com"}
      password: {type: string, example: "pass123"}
      phone: {type: string, example: "555-0123"}
      address: {type: string, example: "123 Main St"}

  UpdateCustomerPayload:
    type: object
    properties:
      name: {type: string}
      phone: {type: string}

  LoginPayload:
    type: object
    required: [email, password]
    properties:
      email: {type: string}
      password: {type: string}

  CreateMechanicPayload:
    type: object
    required: [name, email, phone, salary]
    properties:
      name: {type: string}
      email: {type: string}
      phone: {type: string}
      salary: {type: number}

  UpdateMechanicPayload:
    type: object
    properties:
      salary: {type: number}

  CreateTicketPayload:
    type: object
    required: [vin, service_date, desc, customer_id]
    properties:
      vin: {type: string}
      service_date: {type: string}
      desc: {type: string}
      customer_id: {type: integer}

  CreatePartPayload:
    type: object
    required: [name, price]
    properties:
      name: {type: string}
      price: {type: number}