name: Mechanic Shop API CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: mechanic_shop_db
        ports:
          - 3306:3306
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Tests
      env:
        DEV_DATABASE_URL: mysql+mysqlconnector://root:password@127.0.0.1:3306/mechanic_shop_db
      run: python -m unittest discover tests