name: Mechanic Shop API CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    # This sets up a temporary MySQL database in GitHub to run your tests
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: mechanic_shop_db
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    - name: Run Unit Tests
      env:
        # Tells the tests to use the GitHub MySQL service instead of your local one
        DEV_DATABASE_URL: mysql+mysqlconnector://root:password@127.0.0.1:3306/mechanic_shop_db
      run: |
        python -m unittest discover tests

  deploy:
    needs: test # Only deploy if tests pass!
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}